# Dependency advisory gate (from the /ship security review, folded into T4.1).
# Runs on every push/PR that touches the dependency tree, plus weekly so new
# advisories against pinned versions still surface.
name: cargo-audit

on:
  push:
    paths:
      - "**/Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/audit.yml"
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "Cargo.lock"
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
