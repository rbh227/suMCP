  <path class="arr" d="M444 98 l-10 -5 m10 5 l-10 6"/>
  <path class="arr" d="M606 98 q20 -3 56 0"/>
  <path class="arr" d="M662 98 l-10 -5 m10 5 l-10 6"/>

  <text class="foot" x="460" y="196">no LLM  .  no network  .  read-only</text>
</svg>
